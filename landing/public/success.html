<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — Muninn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --obsidian-card: #0d0d0d;
            --emerald: #10B981;
            --emerald-glow: rgba(16, 185, 129, 0.3);
            --gray-200: #e4e4e7;
            --gray-400: #a1a1aa;
            --gray-800: #27272a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--obsidian);
            color: var(--gray-200);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 600px;
            padding: 48px;
            background: var(--obsidian-card);
            border-radius: 16px;
            border: 1px solid rgba(16, 185, 129, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--emerald) 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            box-shadow: 0 0 40px var(--emerald-glow);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--gray-400);
            margin-bottom: 24px;
        }
        .api-key-box {
            background: var(--obsidian);
            border: 1px solid var(--gray-800);
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .api-key-box code {
            flex: 1;
            word-break: break-all;
            color: var(--emerald);
        }
        .copy-btn {
            background: var(--gray-800);
            border: none;
            color: var(--gray-400);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            color: var(--emerald);
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: var(--emerald);
            color: var(--obsidian);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover {
            box-shadow: 0 0 30px var(--emerald-glow);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✓</div>
        <h1>Welcome to Muninn Pro</h1>
        <p>Your payment was successful. Your API key is ready below.</p>
        
        <div class="api-key-box">
            <code id="apiKey">Loading...</code>
            <button class="copy-btn" onclick="copyKey()">Copy</button>
        </div>
        
        <a href="/dashboard" class="btn">Go to Dashboard</a>
    </div>

    <script>
        // Get API key from URL or storage
        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('key') || localStorage.getItem('muninn_api_key') || 'Your API key';
        document.getElementById('apiKey').textContent = apiKey;
        
        function copyKey() {
            navigator.clipboard.writeText(apiKey);
            document.querySelector('.copy-btn').textContent = 'Copied!';
        }
    </script>
</body>
</html>
